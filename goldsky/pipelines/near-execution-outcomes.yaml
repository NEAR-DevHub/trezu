name: treasury-dao-outcomes
apiVersion: 3
resource_size: s

sources:
  near_outcomes:
    type: dataset
    dataset_name: near.execution_outcomes
    version: 1.1.0
    start_at: latest

transforms:
  # Captures ALL execution outcomes relevant to sputnik-dao treasuries:
  # 1. FT transfers (NEP-141) mentioning a sputnik-dao account in logs
  # 2. Multi-token transfers (NEP-245) mentioning a sputnik-dao account
  # 3. Intents swaps involving sputnik-dao accounts
  # 4. Any outcome where receiver_id is a sputnik-dao account
  #    (native NEAR transfers, function calls, staking, etc.)
  #
  # Note: logs is List(Utf8) so we use array_to_string() for LIKE filtering.
  # action_kind, method_name, and deposit are NOT in execution_outcomes —
  # the enrichment worker derives those from the receipt via RPC if needed.
  dao_outcomes:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        executor_id,
        array_to_string(logs, '\n') as logs,
        status,
        transaction_hash,
        signer_id,
        receiver_id,
        gas_burnt,
        tokens_burnt,
        trigger_block_height,
        trigger_block_hash,
        trigger_block_timestamp
      FROM near_outcomes
      WHERE
        -- FT/MT/intents events mentioning a sputnik-dao account in logs
        ((array_to_string(logs, ' ') LIKE '%"standard":"nep141"%'
          OR array_to_string(logs, ' ') LIKE '%"standard":"nep245"%'
          OR executor_id = 'intents.near')
         AND array_to_string(logs, ' ') LIKE '%sputnik-dao.near%')
        -- OR any outcome where the receiver is a DAO
        -- (captures native NEAR transfers, function calls, staking, etc.)
        OR receiver_id LIKE '%.sputnik-dao.near'

sinks:
  postgres:
    type: postgres
    table: indexed_dao_outcomes
    schema: public
    secret_name: TREASURY_DB_SECRET
    from: dao_outcomes

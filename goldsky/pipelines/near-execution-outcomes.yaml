name: treasury-dao-outcomes
apiVersion: 3
resource_size: s

sources:
  near_outcomes:
    type: dataset
    dataset_name: near.execution_outcomes
    version: 1.1.0
    start_at: latest

transforms:
  # Captures ALL execution outcomes relevant to sputnik-dao treasuries:
  # - Any outcome whose logs mention a sputnik-dao account (FT/MT transfers,
  #   wrap.near plain-text logs, intents swaps, etc.)
  # - Any outcome where receiver_id is a sputnik-dao account
  #   (native NEAR transfers, function calls, staking, etc.)
  #
  # Note: logs is List(Utf8) so we use array_to_string() for LIKE filtering.
  dao_outcomes:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        executor_id,
        array_to_string(logs, '\n') as logs,
        status,
        transaction_hash,
        signer_id,
        receiver_id,
        gas_burnt,
        tokens_burnt,
        trigger_block_height,
        trigger_block_hash,
        trigger_block_timestamp
      FROM near_outcomes
      WHERE array_to_string(logs, ' ') LIKE '%sputnik-dao.near%'
         OR receiver_id LIKE '%.sputnik-dao.near'

sinks:
  postgres:
    type: postgres
    table: indexed_dao_outcomes
    schema: public
    secret_name: TREASURY_DB_SECRET
    from: dao_outcomes

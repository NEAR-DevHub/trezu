name: Frontend E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'nt-fe/**'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'nt-fe/**'
      - '.github/workflows/frontend-e2e.yml'
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sandbox image (force rebuild)
        run: |
          docker build --no-cache -t near-treasury-sandbox:e2e -f sandbox/Dockerfile .

      - name: Start sandbox container
        run: |
          docker run -d --name sandbox \
            -p 3030:3030 -p 4000:4000 -p 8080:8080 -p 5001:5001 \
            --health-cmd "curl -f http://localhost:8080/api/health || exit 1" \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 30 \
            --health-start-period 120s \
            near-treasury-sandbox:e2e

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: nt-fe
        run: bun install

      - name: Install Playwright Browsers
        working-directory: nt-fe
        run: npx playwright install --with-deps chromium

      - name: Wait for sandbox to be ready
        run: |
          echo "Waiting for sandbox to be ready..."
          for i in {1..60}; do
            if curl -s http://localhost:8080/api/health > /dev/null; then
              echo "Sandbox is ready!"
              break
            fi
            echo "Attempt $i: Sandbox not ready yet..."
            sleep 5
          done
        
      - name: Run Playwright tests
        working-directory: nt-fe
        run: bun run test:e2e
        env:
          BACKEND_URL: http://localhost:8080
          NEXT_PUBLIC_BACKEND_API_BASE: http://localhost:8080

      - name: Stop sandbox container
        if: always()
        run: docker stop sandbox || true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: nt-fe/playwright-report/
          retention-days: 30

      - name: Upload Test Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-videos
          path: nt-fe/test-results/
          retention-days: 30
          if-no-files-found: ignore
